<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="highlight-github.min.css">
<link rel="stylesheet" href="katex.min.css">
<script src="markdown-it.min.js"></script>
<script src="highlight.min.js"></script>
<script src="katex.min.js"></script>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a1a;
    --code-bg: #f6f8fa;
    --border: #d0d7de;
    --link: #0969da;
    --blockquote-border: #d0d7de;
    --blockquote-fg: #57606a;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1117;
      --fg: #e6edf3;
      --code-bg: #161b22;
      --border: #30363d;
      --link: #58a6ff;
      --blockquote-border: #3d444d;
      --blockquote-fg: #9198a1;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 16px;
    line-height: 1.6;
  }
  #content {
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 40px 80px;
  }
  h1, h2, h3, h4, h5, h6 {
    margin: 1.5em 0 0.5em;
    line-height: 1.25;
    font-weight: 600;
  }
  h1 { font-size: 2em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
  h2 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
  h3 { font-size: 1.25em; }
  p { margin: 0.8em 0; }
  a { color: var(--link); text-decoration: none; }
  a:hover { text-decoration: underline; }
  ul, ol { margin: 0.8em 0; padding-left: 2em; }
  li { margin: 0.25em 0; }
  li input[type="checkbox"] { margin-right: 0.4em; }
  blockquote {
    border-left: 4px solid var(--blockquote-border);
    color: var(--blockquote-fg);
    padding: 0 1em;
    margin: 0.8em 0;
  }
  hr { border: none; border-top: 1px solid var(--border); margin: 1.5em 0; }
  code {
    background: var(--code-bg);
    border-radius: 4px;
    font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
    font-size: 0.875em;
    padding: 0.2em 0.4em;
  }
  pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow-x: auto;
    padding: 16px;
    margin: 0.8em 0;
  }
  pre code {
    background: none;
    border-radius: 0;
    font-size: 0.875em;
    padding: 0;
  }
  table {
    border-collapse: collapse;
    margin: 0.8em 0;
    width: 100%;
  }
  th, td {
    border: 1px solid var(--border);
    padding: 6px 13px;
    text-align: left;
  }
  th { background: var(--code-bg); font-weight: 600; }
  tr:nth-child(even) td { background: var(--code-bg); }
  img { max-width: 100%; }
  .katex-display { overflow-x: auto; overflow-y: hidden; }
</style>
</head>
<body>
<div id="content"></div>
<script>
const md = window.markdownit({
  html: true,
  linkify: true,
  typographer: true,
  highlight: function(code, lang) {
    if (lang && hljs.getLanguage(lang)) {
      try { return hljs.highlight(code, { language: lang }).value; } catch {}
    }
    return hljs.highlightAuto(code).value;
  }
});

// Task list support
md.core.ruler.after('inline', 'task-lists', function(state) {
  const Token = state.Token;
  state.tokens.forEach(function(blockToken, i) {
    if (blockToken.type !== 'inline' || !blockToken.content) return;
    const parentToken = state.tokens[i - 1];
    if (!parentToken || parentToken.type !== 'list_item_open') return;
    const match = blockToken.content.match(/^\[([ xX])\] /);
    if (!match) return;
    const checked = match[1].toLowerCase() === 'x';
    blockToken.content = blockToken.content.slice(match[0].length);
    blockToken.children = blockToken.children ? blockToken.children.slice(1) : [];
    const checkbox = new Token('html_inline', '', 0);
    checkbox.content = '<input type="checkbox" disabled' + (checked ? ' checked' : '') + '> ';
    blockToken.children.unshift(checkbox);
  });
});

// KaTeX math rendering: replace $...$ and $$...$$ before markdown parsing
function renderMath(src) {
  // Block math $$...$$
  src = src.replace(/\$\$([\s\S]+?)\$\$/g, function(_, tex) {
    try {
      return katex.renderToString(tex.trim(), { displayMode: true, throwOnError: false });
    } catch { return _; }
  });
  // Inline math $...$
  src = src.replace(/\$([^\n$]+?)\$/g, function(_, tex) {
    try {
      return katex.renderToString(tex.trim(), { displayMode: false, throwOnError: false });
    } catch { return _; }
  });
  return src;
}

function render(markdown) {
  const mathProcessed = renderMath(markdown);
  document.getElementById('content').innerHTML = md.render(mathProcessed);
}

// Called from Swift via evaluateJavaScript
window.setMarkdown = function(markdown) {
  render(markdown);
};
</script>
</body>
</html>
