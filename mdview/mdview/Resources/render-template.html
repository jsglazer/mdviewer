<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="highlight-github.min.css">
<link rel="stylesheet" href="katex.min.css">
<script src="markdown-it.min.js"></script>
<script src="highlight.min.js"></script>
<script src="katex.min.js"></script>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a1a;
    --code-bg: #f6f8fa;
    --border: #d0d7de;
    --link: #0969da;
    --blockquote-border: #d0d7de;
    --blockquote-fg: #57606a;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1117;
      --fg: #e6edf3;
      --code-bg: #161b22;
      --border: #30363d;
      --link: #58a6ff;
      --blockquote-border: #3d444d;
      --blockquote-fg: #9198a1;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 16px;
    line-height: 1.6;
  }
  #content {
    padding: 16px 24px 80px;
  }
  h1, h2, h3, h4, h5, h6 {
    margin: 1.5em 0 0.5em;
    line-height: 1.25;
    font-weight: 600;
  }
  h1 { font-size: 2em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
  h2 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
  h3 { font-size: 1.25em; }
  p { margin: 0.8em 0; }
  a { color: var(--link); text-decoration: none; }
  a:hover { text-decoration: underline; }
  ul, ol { margin: 0.8em 0; padding-left: 2em; }
  li { margin: 0.25em 0; }
  li input[type="checkbox"] { margin-right: 0.4em; }
  blockquote {
    border-left: 4px solid var(--blockquote-border);
    color: var(--blockquote-fg);
    padding: 0 1em;
    margin: 0.8em 0;
  }
  hr { border: none; border-top: 1px solid var(--border); margin: 1.5em 0; }
  code {
    background: var(--code-bg);
    border-radius: 4px;
    font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
    font-size: 0.875em;
    padding: 0.2em 0.4em;
  }
  pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow-x: auto;
    padding: 16px;
    margin: 0.8em 0;
  }
  pre code {
    background: none;
    border-radius: 0;
    font-size: 0.875em;
    padding: 0;
  }
  table {
    border-collapse: collapse;
    margin: 0.8em 0;
    width: 100%;
  }
  th, td {
    border: 1px solid var(--border);
    padding: 6px 13px;
    text-align: left;
  }
  th { background: var(--code-bg); font-weight: 600; }
  tr:nth-child(even) td { background: var(--code-bg); }
  img { max-width: 100%; }
  .katex-display { overflow-x: auto; overflow-y: hidden; }
  mark.find-result {
    background: rgba(255, 200, 0, 0.45);
    color: inherit;
    border-radius: 2px;
    padding: 0 1px;
  }
  mark.find-result.active {
    background: rgba(0, 220, 220, 0.65);
    outline: 1px solid rgba(0, 180, 180, 0.8);
  }
  @media (prefers-color-scheme: dark) {
    mark.find-result { background: rgba(180, 130, 0, 0.55); }
    mark.find-result.active { background: rgba(0, 200, 200, 0.65); outline-color: rgba(0, 180, 180, 0.9); }
  }
  /* Line numbers */
  body.line-numbers #content {
    padding-left: 4em;
  }
  .line-num {
    display: inline-block;
    min-width: 2.5em;
    text-align: right;
    margin-left: -3.5em;
    margin-right: 1em;
    color: #aaa;
    font-size: 0.78em;
    font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
    user-select: none;
    pointer-events: none;
    vertical-align: top;
    line-height: 2.05;
  }
  @media (prefers-color-scheme: dark) {
    .line-num { color: #555; }
  }
</style>
</head>
<body>
<div id="content"></div>
<script>
const md = window.markdownit({
  html: true,
  linkify: true,
  typographer: true,
  highlight: function(code, lang) {
    if (lang && hljs.getLanguage(lang)) {
      try { return hljs.highlight(code, { language: lang }).value; } catch {}
    }
    return hljs.highlightAuto(code).value;
  }
});

// Task list support. markdown-it puts a hidden `paragraph_open` between
// `list_item_open` and the `inline` token, so we look back past it. We strip only
// the matched "[x] " prefix from the first text child (not the whole child) so the
// rest of the label survives.
md.core.ruler.after('inline', 'task-lists', function(state) {
  const Token = state.Token;
  state.tokens.forEach(function(inlineTok, i) {
    if (inlineTok.type !== 'inline' || !inlineTok.children) return;
    let p = i - 1;
    if (state.tokens[p] && state.tokens[p].type === 'paragraph_open') p--;
    if (!state.tokens[p] || state.tokens[p].type !== 'list_item_open') return;
    const first = inlineTok.children[0];
    if (!first || first.type !== 'text') return;
    const match = first.content.match(/^\[([ xX])\]\s/);
    if (!match) return;
    const checked = match[1].toLowerCase() === 'x';
    first.content = first.content.slice(match[0].length);
    const checkbox = new Token('html_inline', '', 0);
    checkbox.content = '<input type="checkbox" disabled' + (checked ? ' checked' : '') + '> ';
    inlineTok.children.unshift(checkbox);
  });
});

// Source map: stamp data-md-line on top-level block open/self-closing tokens
md.core.ruler.push('source_map', function(state) {
  state.tokens.forEach(function(tok) {
    if (tok.map && tok.level === 0 && tok.nesting !== -1) {
      tok.attrSet('data-md-line', String(tok.map[0]));
    }
  });
});

// KaTeX math as a token-level rule. Operates only on `text` children of inline
// tokens, so math inside code spans / fenced blocks (which are code_inline /
// fence tokens, never text) is left verbatim. Delimiters must hug their content
// (no inner leading/trailing space) so prose like "$5 to $10" is not matched.
const _mathRe = /\$\$(?!\s)((?:[^$]|\$(?!\$))+?)(?<!\s)\$\$|\$(?!\s)((?:[^$\\]|\\.)+?)(?<!\s)\$/g;

function _mathTokens(content, Token) {
  _mathRe.lastIndex = 0;
  let parts = null, last = 0, m;
  while ((m = _mathRe.exec(content)) !== null) {
    const isDisplay = m[1] !== undefined;
    const tex = (isDisplay ? m[1] : m[2]).trim();
    let html;
    try { html = katex.renderToString(tex, { displayMode: isDisplay, throwOnError: false }); }
    catch (e) { continue; }   // leave malformed math as literal text
    parts = parts || [];
    if (m.index > last) {
      const t = new Token('text', '', 0);
      t.content = content.slice(last, m.index);
      parts.push(t);
    }
    const h = new Token('html_inline', '', 0);
    h.content = html;
    parts.push(h);
    last = m.index + m[0].length;
  }
  if (!parts) return null;
  if (last < content.length) {
    const t = new Token('text', '', 0);
    t.content = content.slice(last);
    parts.push(t);
  }
  return parts;
}

// Registered at the END of the core chain (push), i.e. AFTER `text_join`. The
// inline parser splits a text run on escape sequences (`\pi`, `\frac`, …) and
// `text_join` re-merges those fragments; running before it would leave `$…$`
// straddling fragment boundaries, so backslash-containing math never matched.
md.core.ruler.push('katex_math', function(state) {
  const Token = state.Token;
  state.tokens.forEach(function(blockTok) {
    if (blockTok.type !== 'inline' || !blockTok.children) return;
    const children = blockTok.children;
    for (let i = 0; i < children.length; i++) {
      if (children[i].type !== 'text') continue;
      const replaced = _mathTokens(children[i].content, Token);
      if (replaced) { children.splice(i, 1, ...replaced); i += replaced.length - 1; }
    }
  });
});

// Heading ID generation — reset per render
let _headingIdCount = {};

// Shared selector for h1-h6 (keep in sync across getHeadings / active tracking)
const HEADING_SEL = '#content h1,#content h2,#content h3,#content h4,#content h5,#content h6';

function _makeHeadingId(rawText) {
  // \p{L}\p{N} keeps accented/CJK/Cyrillic letters; ASCII-only \w dropped them all.
  const slug = rawText.toLowerCase()
    .replace(/[^\p{L}\p{N}\s-]/gu, '').trim()
    .replace(/\s+/g, '-').slice(0, 50);
  const base = slug ? 'h-' + slug : 'heading';
  _headingIdCount[base] = (_headingIdCount[base] || 0) + 1;
  return _headingIdCount[base] === 1 ? base : base + '-' + _headingIdCount[base];
}

const _origHeadingOpen = md.renderer.rules.heading_open;
md.renderer.rules.heading_open = function(tokens, idx, options, env, self) {
  const tok = tokens[idx];
  const inline = tokens[idx + 1];
  const rawText = inline ? inline.content.replace(/[*_`~]+/g, '') : '';
  tok.attrSet('id', _makeHeadingId(rawText));
  return _origHeadingOpen
    ? _origHeadingOpen(tokens, idx, options, env, self)
    : self.renderToken(tokens, idx, options);
};

function render(markdown) {
  _headingIdCount = {};
  document.getElementById('content').innerHTML = md.render(markdown);
}

// ── Line numbers ────────────────────────────────────────────────────────────
let _lineNumbers = false;

function _applyLineNumbers() {
  if (_lineNumbers) {
    document.body.classList.add('line-numbers');
    document.querySelectorAll('#content [data-md-line]').forEach(function(el) {
      if (el.querySelector(':scope > .line-num')) return;
      var span = document.createElement('span');
      span.className = 'line-num';
      span.setAttribute('aria-hidden', 'true');
      span.textContent = el.getAttribute('data-md-line');
      el.insertBefore(span, el.firstChild);
    });
  } else {
    document.body.classList.remove('line-numbers');
    document.querySelectorAll('.line-num').forEach(function(el) { el.remove(); });
  }
}

window.setLineNumbers = function(enabled) {
  _lineNumbers = enabled;
  _applyLineNumbers();
};

// Returns inline stylesheet rules only (the template styles + any user CSS).
// External sheets (highlight.js, katex) are skipped — too large to be useful.
window.getDocumentCSS = function() {
  var parts = [];
  try {
    Array.from(document.styleSheets).forEach(function(sheet) {
      if (sheet.href) return;
      try {
        Array.from(sheet.cssRules || []).forEach(function(rule) {
          parts.push(rule.cssText);
        });
      } catch(e) {}
    });
  } catch(e) {}
  return parts.join('\n\n');
};

// Called from Swift
window.setMarkdown = function(markdown) {
  render(markdown);
  _applyLineNumbers();
  _scheduleHeadingNotify();
};

// Return JSON array of {level, text, id} for h1-h5 headings
window.getHeadings = function() {
  const items = [];
  document.querySelectorAll(HEADING_SEL).forEach(function(el) {
    items.push({ level: parseInt(el.tagName[1], 10), text: el.textContent.trim(), id: el.id });
  });
  return JSON.stringify(items);
};

// Scroll to first block element at or after the given 0-based source line
window.scrollToNewContent = function(line) {
  const all = Array.from(document.querySelectorAll('[data-md-line]'));
  let target = null;
  for (let i = 0; i < all.length; i++) {
    if (parseInt(all[i].getAttribute('data-md-line'), 10) >= line) { target = all[i]; break; }
  }
  if (!target && all.length > 0) target = all[all.length - 1];
  if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
};

// Scroll so the last block element is centred in the viewport
window.scrollToBottom = function() {
  const content = document.getElementById('content');
  const last = content ? content.lastElementChild : null;
  if (last) last.scrollIntoView({ behavior: 'smooth', block: 'center' });
  else window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
};

// Scroll a heading into view by its id attribute
window.scrollToHeading = function(id) {
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
};

// Keyboard navigation helpers (called from Swift key handlers)
window.scrollToTop = function() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
};
window.scrollToEnd = function() {
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
};
window.scrollPageUp = function() {
  window.scrollBy({ top: -window.innerHeight * 0.9, behavior: 'smooth' });
};
window.scrollPageDown = function() {
  window.scrollBy({ top: window.innerHeight * 0.9, behavior: 'smooth' });
};

// ── Active heading tracking ─────────────────────────────────────────────────
function _getActiveHeadingIds(referenceEl) {
  const headings = Array.from(document.querySelectorAll(HEADING_SEL));
  if (!headings.length) return [];

  let activeIdx = -1;
  if (referenceEl) {
    for (let i = 0; i < headings.length; i++) {
      // DOCUMENT_POSITION_FOLLOWING means headings[i] comes after referenceEl → stop
      if (referenceEl.compareDocumentPosition(headings[i]) & Node.DOCUMENT_POSITION_FOLLOWING) break;
      activeIdx = i;
    }
  } else {
    const mid = window.innerHeight / 2;
    for (let i = 0; i < headings.length; i++) {
      if (headings[i].getBoundingClientRect().top <= mid) activeIdx = i;
    }
  }

  if (activeIdx < 0) return [];

  const activeHeading = headings[activeIdx];
  const activeLevel = parseInt(activeHeading.tagName[1], 10);
  const ids = [activeHeading.id];

  // Walk back to collect nearest ancestor at each level above activeLevel
  let neededLevel = activeLevel - 1;
  for (let i = activeIdx - 1; i >= 0 && neededLevel >= 1; i--) {
    const level = parseInt(headings[i].tagName[1], 10);
    if (level <= neededLevel) {
      ids.push(headings[i].id);
      neededLevel = level - 1;
    }
  }

  return ids;
}

function _postActiveHeadings(referenceEl) {
  try {
    const ids = _getActiveHeadingIds(referenceEl);
    window.webkit.messageHandlers.activeHeadings.postMessage(JSON.stringify(ids));
  } catch(e) {}
}

let _headingNotifyTimer = null;
function _scheduleHeadingNotify() {
  if (_headingNotifyTimer) clearTimeout(_headingNotifyTimer);
  _headingNotifyTimer = setTimeout(function() { _postActiveHeadings(null); }, 80);
}
window.addEventListener('scroll', _scheduleHeadingNotify, { passive: true });

// ── Find / highlight ────────────────────────────────────────────────────────
let _findMarks = [];
let _activeMarkIndex = -1;

function _clearFind() {
  // Replace each <mark> with its plain text, then normalise adjacent text nodes
  _findMarks.forEach(function(mark) {
    const parent = mark.parentNode;
    if (!parent) return;
    parent.replaceChild(document.createTextNode(mark.textContent), mark);
    parent.normalize();
  });
  _findMarks.length = 0;
  _activeMarkIndex = -1;
}

window.clearFind = _clearFind;

window.findText = function(query) {
  _clearFind();
  if (!query) return '[]';

  const lowerQuery = query.toLowerCase();
  const results = [];
  let matchIndex = 0;

  const content = document.getElementById('content');
  const walker = document.createTreeWalker(content, NodeFilter.SHOW_TEXT, null);

  // Collect all text nodes first (modifying DOM during walk breaks the iterator)
  const textNodes = [];
  let n;
  while ((n = walker.nextNode())) textNodes.push(n);

  // 2-word context, drawing from neighbouring text nodes when the match sits at
  // a node boundary (detached nodes keep their textContent, so this is safe even
  // after earlier nodes have been replaced).
  function ctxBefore(nodeIdx, localBefore) {
    let words = localBefore.trim().split(/\s+/).filter(Boolean);
    for (let j = nodeIdx - 1; j >= 0 && words.length < 2; j--) {
      words = textNodes[j].textContent.trim().split(/\s+/).filter(Boolean).concat(words);
    }
    return words.slice(-2).join(' ');
  }
  function ctxAfter(nodeIdx, localAfter) {
    let words = localAfter.trim().split(/\s+/).filter(Boolean);
    for (let j = nodeIdx + 1; j < textNodes.length && words.length < 2; j++) {
      words = words.concat(textNodes[j].textContent.trim().split(/\s+/).filter(Boolean));
    }
    return words.slice(0, 2).join(' ');
  }

  for (let ni = 0; ni < textNodes.length; ni++) {
    const textNode = textNodes[ni];
    const text = textNode.textContent;
    const lower = text.toLowerCase();
    const positions = [];
    let pos = 0;
    while ((pos = lower.indexOf(lowerQuery, pos)) !== -1) { positions.push(pos); pos += lowerQuery.length; }
    if (!positions.length) continue;

    const frag = document.createDocumentFragment();
    let lastEnd = 0;

    for (const start of positions) {
      const end = start + query.length;
      if (start > lastEnd) frag.appendChild(document.createTextNode(text.slice(lastEnd, start)));

      const mark = document.createElement('mark');
      mark.id = 'find-' + matchIndex;
      mark.className = 'find-result';
      mark.textContent = text.slice(start, end);
      frag.appendChild(mark);
      _findMarks.push(mark);

      results.push({
        index: matchIndex,
        before: ctxBefore(ni, text.slice(0, start)),
        match: text.slice(start, end),
        after: ctxAfter(ni, text.slice(end))
      });
      matchIndex++;
      lastEnd = end;
    }
    if (lastEnd < text.length) frag.appendChild(document.createTextNode(text.slice(lastEnd)));
    textNode.parentNode.replaceChild(frag, textNode);
  }

  return JSON.stringify(results);
};

window.scrollToMatch = function(index) {
  if (_activeMarkIndex >= 0) {
    const prev = document.getElementById('find-' + _activeMarkIndex);
    if (prev) prev.classList.remove('active');
  }
  const el = document.getElementById('find-' + index);
  if (el) {
    el.classList.add('active');
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    _activeMarkIndex = index;
    _postActiveHeadings(el);
  }
};

// Inject or update custom user CSS in <head>
window.setCustomCSS = function(css) {
  let el = document.getElementById('user-css');
  if (!el) {
    el = document.createElement('style');
    el.id = 'user-css';
    document.head.appendChild(el);
  }
  el.textContent = css;
};
</script>
</body>
</html>
